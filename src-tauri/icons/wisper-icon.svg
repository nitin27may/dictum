<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#115e59"/>
    </linearGradient>
    <linearGradient id="mic" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>
  <!-- Microphone body -->
  <rect x="216" y="112" width="80" height="160" rx="40" fill="url(#mic)"/>
  <!-- Microphone arc -->
  <path d="M176 252 v20 a80 80 0 0 0 160 0 v-20"
        fill="none" stroke="white" stroke-width="20" stroke-linecap="round"/>
  <!-- Microphone stand -->
  <line x1="256" y1="352" x2="256" y2="400"
        stroke="white" stroke-width="20" stroke-linecap="round"/>
  <!-- Sound wave left -->
  <path d="M140 200 q-20 56 0 112"
        fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="14" stroke-linecap="round"/>
  <path d="M104 176 q-28 80 0 160"
        fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="12" stroke-linecap="round"/>
  <!-- Sound wave right -->
  <path d="M372 200 q20 56 0 112"
        fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="14" stroke-linecap="round"/>
  <path d="M408 176 q28 80 0 160"
        fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="12" stroke-linecap="round"/>
</svg>
