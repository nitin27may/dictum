<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22">
  <!-- Microphone body -->
  <rect x="8" y="3" width="6" height="9" rx="3" fill="black"/>
  <!-- Microphone arc -->
  <path d="M6 11 v1 a5 5 0 0 0 10 0 v-1"
        fill="none" stroke="black" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Stand -->
  <line x1="11" y1="17" x2="11" y2="19"
        stroke="black" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Sound waves -->
  <path d="M4.5 8 q-1.2 3 0 6"
        fill="none" stroke="black" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <path d="M17.5 8 q1.2 3 0 6"
        fill="none" stroke="black" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
</svg>
