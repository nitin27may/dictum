<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wisper</title>
    <script>
      // Set window background before React mounts to prevent white flash.
      // Tauri injects window.__TAURI_INTERNALS__ synchronously before scripts run.
      try {
        var label = window.__TAURI_INTERNALS__?.metadata?.currentWindow?.label;
        var isSettings = label === 'settings' || window.location.hash === '#settings';
        if (isSettings) {
          document.documentElement.style.background = '#18181b';
          document.documentElement.style.color = '#f4f4f5';
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
